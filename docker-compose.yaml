services:
  db:
    image: postgres:17-alpine
    ports:
      - ${DB_PORT}:${DB_PORT}
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - aureus_db:/var/lib/postgresql/data
  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: aureus-s3
    env_file:
      - .env
    ports:
      - "8333:8333"
      - "9333:9333"
      - "19333:19333"
      - "8888:8888"
    volumes:
      - seaweedfs_aureus_data:/data
    entrypoint:
      - /bin/sh
      - -c
      - >
        echo '{"identities":[{"name":"aureus","credentials":[{"accessKey":"'$$S3_ACCESS_KEY'","secretKey":"'$$S3_SECRET_KEY'"}],"actions":["Read","Write","List","Tagging","Admin"]}]}' > /tmp/s3.config.json &&
        weed server -dir=/data -s3 -s3.port=8333 -s3.config=/tmp/s3.config.json
    restart: unless-stopped
volumes:
  aureus_db:
  seaweedfs_aureus_data:
